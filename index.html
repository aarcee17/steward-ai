<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steward.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --navy: #0D1117;
      --off-white: #F0EEE9;
      --sage: #8BA888;
      --teal: #00C2A8;
      --teal-dim: rgba(0, 194, 168, 0.12);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--navy);
      color: var(--off-white);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle ambient glow behind the name */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, var(--teal-dim) 0%, transparent 70%);
      animation: glow-pulse 6s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    }

    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 0 24px;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(72px, 14vw, 152px);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--off-white);
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .dot-ai {
      color: var(--teal);
      font-style: normal;
    }

    .tagline {
      font-size: clamp(13px, 1.8vw, 16px);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sage);
    }

    /* Thin teal line divider */
    .rule {
      width: 40px;
      height: 1px;
      background: var(--teal);
      opacity: 0.5;
    }

    footer {
      position: fixed;
      bottom: 32px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(240, 238, 233, 0.2);
      font-weight: 300;
      z-index: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .wordmark, body::before { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">Steward<span class="dot-ai">.ai</span></h1>
    <div class="rule"></div>
    <p class="tagline">Coming soon</p>
  </main>
  <footer>© 2026 Steward.ai</footer>
</body>
</html>
